language: java
branches:
  only:
  - master
  - /^\d+\.\d+$/
before_install:
  - wget https://github.com/sormuras/bach/raw/master/install-jdk.sh
cache:
  directories:
    - $HOME/.m2
before_cache:
  - rm -rf $HOME/.m2/repository/io/vertx/
jobs:
  include:
    - stage: test
      name: "OpenJDK 8"
      jdk: openjdk8
      script: mvn -q clean verify -B -Dtest=Http2Test
      install: . ./install-jdk.sh --url "https://api.adoptopenjdk.net/v2/binary/releases/openjdk8?openjdk_impl=hotspot&os=linux&type=jdk&release=latest&heap_size=normal&arch=x64"
    - if: type != pull_request
      name: "OpenJDK 11"
      jdk: openjdk11
      script: mvn -q clean verify -B -Dtest=Http2Test
    - if: type != pull_request
      name: "OpenJDK 8 / native transport"
      jdk: openjdk8
      script: mvn -q clean verify -B -PtestNativeTransport -Dtest=Http2Test
    - if: type != pull_request
      name: "OpenJDK 8 / domain sockets"
      jdk: openjdk8
      script: mvn -q clean verify -B -PtestDomainSockets -Dtest=Http2Test
    - stage: deploy
      name: "Deploy to Sonatype's snapshots repository"
      jdk: openjdk8
      if: type != pull_request AND env(SONATYPE_NEXUS_USERNAME) IS present
      script: bash .travis.deploy.artifacts.sh
